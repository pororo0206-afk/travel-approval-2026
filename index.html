const ROPTS=['완료','완료(결제완료)','신청완료','부스신청완료','이메일문의완료','문의완료','대기','미신청','미확정','미등록'];
let ST={},AF='all',SQ='',CID=null;

function load(){
  const b={};EVS.forEach(e=>{b[e.id]={reg:e.reg0||'미확정',fl:false,att:'',fare:e.fare||0,imgs:[]};});
  try{
    const s=localStorage.getItem(SK);
    if(s){
      const p=JSON.parse(s);
      Object.keys(p).forEach(k=>{if(b[k])b[k]={...b[k],...p[k]};});
    }
  }catch(e){}
  ST=b;
}
function save(){try{localStorage.setItem(SK,JSON.stringify(ST));}catch(e){}}
function gd(id){const e=EVS.find(x=>x.id==id)||{};return ST[id]||{reg:e.reg0||'미등록',fl:false,att:'',fare:e.fare||0,imgs:[]};}
function setMsg(text,ok=true){const m=document.getElementById('smsg');if(m){m.textContent=text;m.className=ok?'mok':'mer';}}
async function loadRemote(){
  if(!supabaseClient)return;
  try{
    const {data:statusData,error:statusErr}=await supabaseClient.from('event_status').select('*');
    if(statusErr)throw statusErr;
    (statusData||[]).forEach(row=>{
      const id=row.event_id;
      if(ST[id]){
        ST[id]={...ST[id],
          reg:row.registration_status||ST[id].reg,
          fl:!!row.flight_reserved,
          att:row.participant_name||'',
          fare:+(row.airfare_per_person||ST[id].fare||0)
        };
      }
    });
    const {data:attachData,error:attachErr}=await supabaseClient.from('event_attachments').select('event_id,file_url').order('created_at',{ascending:true});
    if(attachErr)throw attachErr;
    (attachData||[]).forEach(row=>{
      const id=row.event_id;
      if(ST[id]&&row.file_url){
        if(!ST[id].imgs)ST[id].imgs=[];
        if(!ST[id].imgs.includes(row.file_url))ST[id].imgs.push(row.file_url);
      }
    });
    save();
  }catch(err){
    console.error('Supabase load failed:',err);
  }
}
async function saveStatusRemote(id){
  if(!supabaseClient)return;
  const e=EVS.find(x=>x.id===id);const d=gd(id);if(!e)return;
  const row={
    event_id:id,
    registration_status:d.reg,
    flight_reserved:!!d.fl,
    participant_name:d.att||'',
    participant_count:+e.att||0,
    airfare_per_person:+d.fare||0,
    airfare_total:(+d.fare||0)*(+e.att||0),
    updated_at:new Date().toISOString()
  };
  const {data:existing,error:selectErr}=await supabaseClient.from('event_status').select('id').eq('event_id',id).limit(1);
  if(selectErr)throw selectErr;
  if(existing&&existing.length){
    const {error}=await supabaseClient.from('event_status').update(row).eq('id',existing[0].id);
    if(error)throw error;
  }else{
    const {error}=await supabaseClient.from('event_status').insert(row);
    if(error)throw error;
  }
}
function storagePathFromUrl(url){
  const marker='/storage/v1/object/public/'+SUPABASE_BUCKET+'/';
  const idx=String(url).indexOf(marker);
  return idx>=0?decodeURIComponent(String(url).slice(idx+marker.length)):null;
}
function fareNum(e){return +(gd(e.id).fare||e.fare||0);}
function krw(e){const v=fareNum(e);return v?v.toLocaleString()+'원':'—';}
function eventFlightTotal(e){const v=fareNum(e)*(+e.att||0);return v?v.toLocaleString()+'원':'—';}
function flightTotal(){return EVS.reduce((sum,e)=>sum+fareNum(e)*(+e.att||0),0);}
function parseWon(v){return +(String(v||'').replace(/[^0-9]/g,'')||0);}
function wonShort(n){return n>=100000000?(n/100000000).toFixed(1).replace('.0','')+'억원':Math.round(n/10000).toLocaleString()+'만원';}
function isPaid(v){return v==='완료'||v==='완료(결제완료)';}
function isRegistered(v){return ['완료','완료(결제완료)','신청완료','부스신청완료'].includes(v);}
function rc(v){
  return isPaid(v)?'badge b-done':
  (v==='신청완료'||v==='부스신청완료')?'badge b-reg':
  (v==='이메일문의완료'||v==='문의완료'||v==='대기')?'badge b-q':
  'badge b-none';
}

function rStats(){
  const paidCnt=EVS.filter(e=>isPaid(gd(e.id).reg)).length;
  const totalFlight=flightTotal();
  document.getElementById('stats').innerHTML=[
    ['총 행사',EVS.length],
    ['미국',EVS.filter(e=>e.ct==='us').length],
    ['호주',EVS.filter(e=>e.ct==='au').length],
    ['행사비 결제 완료',paidCnt],
    ['항공편 예상 결제액',wonShort(totalFlight)]
  ].map(([l,v])=>`<div class="stat"><div class="stat-lbl">${l}</div><div class="stat-val">${v}</div></div>`).join('');
}

function rTable(){
  const list=EVS.filter(e=>{const d=gd(e.id);const mq=!SQ||[e.name,e.city,e.host].join(' ').toLowerCase().includes(SQ);const mf=AF==='all'?true:AF==='us'?e.ct==='us':AF==='au'?e.ct==='au':AF==='reg'?isPaid(d.reg):d.fl;return mq&&mf;});
  document.getElementById('tbody').innerHTML=list.map(e=>{const d=gd(e.id);return`<tr class="row" onclick="oP(${e.id})"><td style="font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:0" title="${e.n} ${e.name}">${e.n} ${e.name}</td><td style="color:#888;white-space:nowrap">${e.date}</td><td style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:0">${e.city}</td><td>${e.type}</td><td><span class="${rc(d.reg)}">${d.reg}</span></td><td style="font-weight:700;text-align:center">${e.att}</td><td><span class="badge ${d.fl?'b-fy':'b-fn'}">${d.fl?'예약완료':'미예약'}</span></td><td class="krw">${eventFlightTotal(e)}</td><td>${d.att?`<span class="af">${d.att}</span>`:`<span class="ae">미입력</span>`}</td></tr>`;}).join('');
}

function oP(id){
  CID=id;const e=EVS.find(x=>x.id===id);const d=gd(id);
  document.getElementById('ptitle').textContent=e.n+' '+e.name;
  document.getElementById('pbadges').innerHTML=`<span class="badge ${e.ct==='us'?'b-us':'b-au'}">${e.ct==='us'?'🇺🇸 미국':'🇦🇺 호주'}</span> <span class="badge b-none" style="margin-left:5px">${e.type}</span>`;
  const ro=ROPTS.map(o=>`<option value="${o}"${d.reg===o?' selected':''}>${o}</option>`).join('');
  const sh=e.sched.map(s=>{const ci=s.indexOf(':');return`<div class="sitem"><span class="sday">${s.substring(0,ci)}</span><span class="stxt">${s.substring(ci+1).trim()}</span></div>`;}).join('');
  const lh=e.links.map(lk=>`<a class="lbtn" href="${lk.u}" target="_blank">🔗 ${lk.l}</a>`).join('');
  document.getElementById('pbody').innerHTML=`
<div class="ebox"><div class="etit">상태 관리</div>
<div class="erow">
  <div><div class="elbl">행사비 등록 상태</div><select class="esel" id="er">${ro}</select></div>
  <div><div class="elbl">항공편 예약</div><div class="trow"><button class="tbtn ${d.fl?'oy':''}" id="by" onclick="sF(true)">예약완료</button><button class="tbtn ${!d.fl?'on2':''}" id="bn" onclick="sF(false)">미예약</button></div></div>
</div>
<div style="margin-bottom:12px"><div class="elbl">항공권 금액 입력 (1인 왕복, 원)</div><input class="ainp" id="efare" value="${fareNum(e)?fareNum(e).toLocaleString():''}" placeholder="예: 2,546,300" oninput="previewFareTotal(${e.id})"></div>
<div style="margin-bottom:12px"><div class="elbl">참가자 입력</div><input class="ainp" id="ea" value="${d.att||''}" placeholder="예: 홍길동, 김철수"></div>
<div class="sec" style="margin-bottom:12px"><div class="stit">첨부 이미지</div><div class="attach-box" id="attachBox" tabindex="0" onpaste="handlePaste(event)" onclick="this.focus()"><div class="attach-guide">이 영역을 클릭한 뒤 Ctrl/Cmd+V로 캡처 이미지를 붙여넣거나, 아래 버튼으로 이미지를 선택하세요. 저장 후 Supabase 서버에 업로드되어 같은 주소에 접속한 사람도 볼 수 있습니다.</div><div class="attach-actions"><label class="attach-btn">이미지 선택<input type="file" accept="image/*" multiple style="display:none" onchange="handleFileSelect(event)"></label><button type="button" class="attach-btn" onclick="clearImages()">전체 삭제</button></div><div class="attach-grid" id="attachGrid"></div></div></div>
<div class="srow"><button class="sbtn" onclick="doS()">저장</button><span id="smsg"></span></div></div>
<div class="sec"><div class="stit">기본 정보</div><div class="igrid">${[['주최',e.host],['구분',e.type],['일정',e.date],['장소',e.venue],['예상 방문객',e.vis+'명'],['치과의사 추정',e.den+'명'],['목표 리드',e.leads+'명'],['참가인원',e.att+'명']].map(([l,v])=>`<div class="iitem"><div class="ilbl">${l}</div><div class="ival">${v}</div></div>`).join('')}</div></div>
<div class="sec"><div class="stit">출장 목적</div><p class="ptxt">${e.purpose}</p></div>
<div class="sec"><div class="stit">출장 일정 계획</div>${sh}</div>
<div class="sec"><div class="stit">항공권 견적 (직접 입력 · 1인 왕복 기준)</div><div class="fbox"><div class="froute">✈ ${e.fr}</div><div class="fusd">직접 입력된 항공권 금액 / 1인</div><div class="fkrw">${krw(e)} / 인당</div><div class="fkrw" id="fare-preview" style="margin-top:6px">총 ${eventFlightTotal(e)} / 참가인원 ${e.att}명</div><div class="frate">입력 금액은 저장 후 테이블 및 상단 항공편 예상 결제액에 자동 반영</div></div></div>
<div class="sec"><div class="stit">관련 링크</div>${lh}</div>
${e.notes?`<div class="sec"><div class="stit">비고</div><p class="ntxt">${e.notes}</p></div>`:''}`;
  document.getElementById('ov').classList.add('open');
  document.getElementById('panel').classList.add('open');
  renderImages();
  setTimeout(()=>{const box=document.getElementById('attachBox'); if(box)box.focus();},50);
}

function sF(v){document.getElementById('by').className='tbtn'+(v?' oy':'');document.getElementById('bn').className='tbtn'+(!v?' on2':'');}
function previewFareTotal(id){
  const e=EVS.find(x=>x.id===id);
  const input=document.getElementById('efare');
  const preview=document.getElementById('fare-preview');
  if(!e||!input||!preview)return;
  const fare=parseWon(input.value);
  preview.textContent=fare?'총 '+(fare*(+e.att||0)).toLocaleString()+'원 / 참가인원 '+e.att+'명':'총 — / 참가인원 '+e.att+'명';
}
async function doS(){
  ST[CID]={
    ...gd(CID),
    reg:document.getElementById('er').value,
    fl:document.getElementById('by').classList.contains('oy'),
    att:document.getElementById('ea').value,
    fare:parseWon(document.getElementById('efare').value),
    imgs:gd(CID).imgs||[]
  };
  save();
  try{
    await saveStatusRemote(CID);
    setMsg(supabaseClient?'✓ Supabase 저장 완료':'✓ 로컬 저장됨 — anon key 입력 후 서버 저장 가능',true);
  }catch(err){
    console.error(err);
    setMsg('Supabase 저장 실패: 테이블/정책/API 키를 확인하세요',false);
  }
  rStats();rTable();
  const e=EVS.find(x=>x.id===CID);if(e)document.getElementById('fare-preview').textContent='총 '+eventFlightTotal(e)+' / 참가인원 '+e.att+'명';
}

function renderImages(){
  const grid=document.getElementById('attachGrid');
  if(!grid||!CID)return;
  const imgs=gd(CID).imgs||[];
  grid.innerHTML=imgs.length?imgs.map((src,i)=>`<div class="attach-card"><img src="${src}" alt="첨부 이미지 ${i+1}" onclick="openLightbox('${src}')"><button class="attach-del" onclick="removeImage(${i});event.stopPropagation();">×</button></div>`).join(''):`<div class="attach-empty">아직 첨부된 이미지가 없습니다.</div>`;
}
async function addImagesFromFiles(files){
  if(!CID||!files||!files.length)return;
  const imageFiles=[...files].filter(f=>f&&f.type&&f.type.startsWith('image/'));
  if(!imageFiles.length)return;
  if(!supabaseClient){setMsg('anon public key 입력 전입니다. Supabase 연결 후 업로드됩니다.',false);return;}
  setMsg('이미지 업로드 중...',true);
  try{
    const urls=[];
    for(const file of imageFiles){
      if(file.size>10*1024*1024)throw new Error('10MB 초과 파일이 있습니다.');
      const ext=(file.name.split('.').pop()||'png').toLowerCase().replace(/[^a-z0-9]/g,'')||'png';
      const safeName=(file.name||('image.'+ext)).replace(/[^a-zA-Z0-9._-]/g,'_');
      const path=`event_${CID}/${Date.now()}_${Math.random().toString(36).slice(2)}_${safeName}`;
      const {error:uploadErr}=await supabaseClient.storage.from(SUPABASE_BUCKET).upload(path,file,{contentType:file.type,upsert:false});
      if(uploadErr)throw uploadErr;
      const {data:pub}=supabaseClient.storage.from(SUPABASE_BUCKET).getPublicUrl(path);
      const url=pub.publicUrl;
      const {error:dbErr}=await supabaseClient.from('event_attachments').insert({event_id:CID,file_name:file.name||safeName,file_url:url});
      if(dbErr)throw dbErr;
      urls.push(url);
    }
    const d=gd(CID);
    ST[CID]={...d,imgs:[...(d.imgs||[]),...urls]};
    save();renderImages();setMsg('✓ 이미지 업로드 완료',true);
  }catch(err){
    console.error(err);setMsg('이미지 업로드 실패: Storage bucket/정책/API 키를 확인하세요',false);
  }
}
function handlePaste(ev){
  const items=ev.clipboardData&&ev.clipboardData.items;
  if(!items)return;
  const files=[];
  for(const item of items){if(item.type&&item.type.startsWith('image/')){files.push(item.getAsFile());}}
  if(files.length){ev.preventDefault();addImagesFromFiles(files);}
}
function handleFileSelect(ev){addImagesFromFiles(ev.target.files);ev.target.value='';}
async function removeImage(idx){
  if(!CID)return;
  const d=gd(CID);const imgs=[...(d.imgs||[])];const url=imgs[idx];imgs.splice(idx,1);
  ST[CID]={...d,imgs};save();renderImages();
  try{
    if(supabaseClient&&url){
      await supabaseClient.from('event_attachments').delete().eq('event_id',CID).eq('file_url',url);
      const path=storagePathFromUrl(url);if(path)await supabaseClient.storage.from(SUPABASE_BUCKET).remove([path]);
    }
    setMsg('✓ 이미지 삭제됨',true);
  }catch(err){console.error(err);setMsg('이미지 삭제 실패',false);}
}
async function clearImages(){
  if(!CID)return;
  const d=gd(CID);const imgs=[...(d.imgs||[])];ST[CID]={...d,imgs:[]};save();renderImages();
  try{
    if(supabaseClient){
      await supabaseClient.from('event_attachments').delete().eq('event_id',CID);
      const paths=imgs.map(storagePathFromUrl).filter(Boolean);if(paths.length)await supabaseClient.storage.from(SUPABASE_BUCKET).remove(paths);
    }
    setMsg('✓ 첨부 이미지 전체 삭제됨',true);
  }catch(err){console.error(err);setMsg('이미지 삭제 실패',false);}
}
function openLightbox(src){document.getElementById('lightbox-img').src=src;document.getElementById('lightbox').classList.add('open');}
function closeLightbox(){document.getElementById('lightbox').classList.remove('open');document.getElementById('lightbox-img').src='';}
document.addEventListener('paste',function(ev){
  if(!CID)return;
  const panel=document.getElementById('panel');
  if(panel&&panel.classList.contains('open'))handlePaste(ev);
});

function cP(){document.getElementById('ov').classList.remove('open');document.getElementById('panel').classList.remove('open');CID=null;}

document.getElementById('ov').onclick=cP;
document.getElementById('clos').onclick=cP;
document.querySelectorAll('.fbtn').forEach(b=>{b.onclick=function(){document.querySelectorAll('.fbtn').forEach(x=>x.classList.remove('on'));this.classList.add('on');AF=this.dataset.f;rTable();};});
document.getElementById('search').oninput=function(){SQ=this.value.toLowerCase();rTable();};

async function init(){
  load();
  await loadRemote();
  rStats();
  rTable();
}
init();
</script>
</body>
</html>
